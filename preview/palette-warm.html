<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head><body>
<div class="card">
  <label class="k">Warm lights · for breath</label>
  <div class="row">
    <div class="sw" style="background:var(--felora-blush); color:var(--felora-noir);">
      <span class="sw__name">Blush</span>
      <span class="sw__hex" style="opacity:0.6;">#E8D5C4</span>
    </div>
    <div class="sw" style="background:var(--felora-cream); color:var(--felora-noir);">
      <span class="sw__name">Cream</span>
      <span class="sw__hex" style="opacity:0.6;">#EFE9E0</span>
    </div>
    <div class="sw" style="background:var(--felora-ivory); color:var(--felora-noir);">
      <span class="sw__name">Ivory</span>
      <span class="sw__hex" style="opacity:0.6;">#F7F3EE</span>
    </div>
    <div class="sw" style="background:#FAF7F2; color:var(--felora-noir);">
      <span class="sw__name">Bone</span>
      <span class="sw__hex" style="opacity:0.6;">#FAF7F2</span>
    </div>
  </div>
  <p class="note">Blush is reserved for the Final CTA only. Cream backs the Benefits sections. Ivory is the default light background. Bone backs cards floating on ivory.</p>
</div></body></html>
