<!doctype html><html><head><meta charset="utf-8" /><link rel="stylesheet" href="../colors_and_type.css" /><link rel="stylesheet" href="card.css" /></head><body>
<div class="card" style="gap:16px;">
  <label class="k">Border radius · zero, always</label>
  <div style="display:flex; gap:16px; align-items:center;">
    <div style="width:80px; height:80px; background:var(--felora-noir);"></div>
    <div style="width:80px; height:80px; background:var(--felora-gold);"></div>
    <div style="width:80px; height:80px; border:1px solid var(--border-strong);"></div>
    <div style="flex:1;">
      <p style="font-family:var(--font-serif); font-weight:400; font-style:italic; font-size:24px; color:var(--felora-noir); line-height:1.2;">Sharp edges only.</p>
      <p class="note" style="margin-top:8px;">Buttons · cards · inputs · images · modals · the wordmark · everything. <strong style="color:var(--felora-noir); font-weight:500;">0px. No exceptions.</strong></p>
    </div>
  </div>
</div></body></html>
