<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head><body>
<div class="card" style="gap:18px; padding:32px 36px;">
  <label class="k">Wordmark · the FELŌRA brand logo</label>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:stretch;">
    <div style="background:var(--felora-ivory); padding:24px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); min-height:200px;">
      <img src="../assets/logo-felora.png" alt="FELŌRA — For she who carries life" style="width:100%; max-width:280px; height:auto; display:block;" />
    </div>
    <div style="background:var(--felora-noir); padding:24px; display:flex; align-items:center; justify-content:center; min-height:200px;">
      <img src="../assets/logo-felora-light.png" alt="FELŌRA — For she who carries life" style="width:100%; max-width:280px; height:auto; display:block;" />
    </div>
  </div>
  <p class="note">The FELŌRA wordmark — serif capitals with the macron over the Ō, set above a tan rule and the brand tagline. Light variant on ivory, dark variant on noir. Never recoloured. Never on a busy photograph without a tinted overlay.</p>
</div>
</body></html>
