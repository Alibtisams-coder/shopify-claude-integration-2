<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head><body>
<div class="card">
  <label class="k">The accent · used with restraint</label>
  <div style="display:grid; grid-template-columns:1fr 1.6fr; gap:16px; align-items:stretch;">
    <div class="sw" style="background:var(--felora-gold); color:var(--felora-noir); min-height:120px; border:none;">
      <span class="sw__name">Gold</span>
      <span class="sw__hex" style="opacity:0.55;">#C4A882</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; justify-content:center;">
      <p style="font-family:var(--font-serif); font-style:italic; font-weight:400; font-size:22px; color:var(--felora-noir); line-height:1.3;">She who <em style="color:var(--felora-terra);">carries life</em></p>
      <span style="display:block; width:44px; height:1px; background:var(--felora-gold); margin:6px 0;"></span>
      <p class="note">Hairline rules · italic climax phrase · button hover slide-in · 1px focus border. <strong style="color:var(--felora-noir); font-weight:500;">Never a background colour.</strong></p>
    </div>
  </div>
</div></body></html>
