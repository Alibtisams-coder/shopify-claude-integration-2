<!doctype html><html><head><meta charset="utf-8" /><link rel="stylesheet" href="../colors_and_type.css" /><link rel="stylesheet" href="card.css" /></head><body>
<div class="card" style="gap:0; padding:20px 28px;">
  <label class="k" style="margin-bottom:14px;">Testimonial card</label>
  <div style="padding:28px 24px; border:1px solid var(--border); background:#FAF7F2; display:flex; flex-direction:column; gap:18px;">
    <p style="font-family:var(--font-serif); font-weight:300; font-size:18px; line-height:1.5; color:var(--felora-noir);">"I cried the first time I pumped on the school run. For the first time in three months, I was not chained to the kitchen wall."</p>
    <div style="display:grid; grid-template-columns:44px 1fr; gap:14px; align-items:center;">
      <img src="../assets/images/testimonial-0.jpg" alt="" style="width:44px; height:44px; object-fit:cover;" />
      <div>
        <p style="font-family:var(--font-serif); font-style:italic; font-weight:400; font-size:14px; color:var(--felora-noir);">Anneliese R.</p>
        <p style="font-family:var(--font-sans); font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--felora-terra);">Mother of two · Hampstead</p>
      </div>
    </div>
  </div>
</div></body></html>
