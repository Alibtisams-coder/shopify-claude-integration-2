<!doctype html><html><head><meta charset="utf-8" /><link rel="stylesheet" href="../colors_and_type.css" /><link rel="stylesheet" href="card.css" /></head><body>
<div class="card card--dark" style="gap:10px;">
  <label class="k" style="color:var(--felora-gold);">Price block · no .99</label>
  <div style="display:flex; gap:18px; align-items:baseline; margin-top:6px;">
    <span style="font-family:var(--font-serif); font-weight:300; font-size:64px; color:#fff; line-height:1;">£230</span>
    <s style="font-family:var(--font-serif); font-weight:300; font-size:22px; color:#c9c1b4; opacity:0.6;">£295</s>
  </div>
  <p style="font-family:var(--font-sans); font-size:10px; text-transform:uppercase; letter-spacing:0.26em; color:var(--felora-gold); margin-top:6px;">Hands Free · Whisper Quiet · Doctor Safe</p>
  <p class="note" style="color:#c9c1b4;">Whole-pound prices, never £229.99. Compare-at struck through, never red.</p>
</div></body></html>
