<!doctype html><html><head><meta charset="utf-8" /><link rel="stylesheet" href="../colors_and_type.css" /><link rel="stylesheet" href="card.css" /></head><body>
<div class="card" style="gap:14px;">
  <label class="k">Button · hover state (mid-slide)</label>
  <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-top:6px;">
    <a class="btn" href="#" style="background:linear-gradient(90deg, var(--felora-gold) 0%, var(--felora-gold) 60%, var(--felora-noir) 60%, var(--felora-noir) 100%); border-color:var(--felora-gold); color:var(--felora-ivory);">Mid-slide hover</a>
    <a class="btn" href="#" style="background:var(--felora-gold); border-color:var(--felora-gold); color:var(--felora-noir);">Fully hovered</a>
  </div>
  <p class="note">Gold sweeps in from the left in 560ms. Text colour crossfades to noir. Border becomes gold. No bounce, no scale.</p>
</div></body></html>
