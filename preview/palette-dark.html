<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head><body>
<div class="card">
  <label class="k">Dark family · grounding</label>
  <div class="row">
    <div class="sw" style="background:var(--felora-onyx); color:#fff; border-color:var(--border-inverse);">
      <span class="sw__name" style="color:var(--felora-gold);">Onyx</span>
      <span class="sw__hex" style="color:#c9c1b4;">#1A1410</span>
    </div>
    <div class="sw" style="background:var(--felora-noir); color:#fff; border-color:var(--border-inverse);">
      <span class="sw__name" style="color:var(--felora-gold);">Noir</span>
      <span class="sw__hex" style="color:#c9c1b4;">#2C2C2A</span>
    </div>
    <div class="sw" style="background:var(--felora-mink); color:#fff; border-color:var(--border-inverse);">
      <span class="sw__name" style="color:#fff;">Mink</span>
      <span class="sw__hex" style="color:rgba(255,255,255,0.7);">#7A6055</span>
    </div>
    <div class="sw" style="background:var(--felora-terra); color:#fff; border-color:var(--border-inverse);">
      <span class="sw__name" style="color:#fff;">Terra</span>
      <span class="sw__hex" style="color:rgba(255,255,255,0.7);">#8B6F5E</span>
    </div>
  </div>
  <p class="note">Onyx for footers and the marquee. Noir is the primary dark surface. Mink is body copy on light. Terra is eyebrows and the italic phrase on light backgrounds.</p>
</div></body></html>
