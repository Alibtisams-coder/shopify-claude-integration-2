<!doctype html><html><head><meta charset="utf-8" /><link rel="stylesheet" href="../colors_and_type.css" /><link rel="stylesheet" href="card.css" /></head><body>
<div class="card" style="gap:0; padding:24px 36px;">
  <label class="k" style="margin-bottom:10px;">FAQ accordion</label>
  <div style="border-top:1px solid var(--border-strong); border-bottom:1px solid var(--border-strong);">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 0; border-bottom:1px solid var(--border-strong);">
      <span style="font-family:var(--font-serif); font-weight:400; font-size:18px; color:var(--felora-noir);">How quietly does it actually run?</span>
      <span style="position:relative; width:14px; height:14px;"><span style="position:absolute; inset:0; margin:auto; width:14px; height:1px; background:var(--felora-noir);"></span></span>
    </div>
    <div style="padding:18px 0;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-family:var(--font-serif); font-weight:400; font-size:18px; color:var(--felora-terra);">Is it covered on the NHS?</span>
        <span style="position:relative; width:14px; height:14px;"><span style="position:absolute; inset:0; margin:auto; width:14px; height:1px; background:var(--felora-terra);"></span><span style="position:absolute; inset:0; margin:auto; width:1px; height:14px; background:var(--felora-terra);"></span></span>
      </div>
      <p style="font-family:var(--font-sans); font-size:13px; line-height:1.7; color:var(--felora-mink); margin-top:12px; max-width:560px;">Not yet — we are working with NHS Supply Chain. Our 30-day return is unconditional.</p>
    </div>
  </div>
</div></body></html>
