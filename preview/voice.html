<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head><body>
<div class="card">
  <label class="k">Voice — say / never say</label>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:8px;">
    <div>
      <p style="font-family:var(--font-sans); font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--felora-gold); margin-bottom:12px;">FELŌRA says</p>
      <p style="font-family:var(--font-serif); font-style:italic; font-weight:400; font-size:17px; line-height:1.5; color:var(--felora-noir);">You deserve to feel held.</p>
      <p style="font-family:var(--font-serif); font-style:italic; font-weight:400; font-size:17px; line-height:1.5; color:var(--felora-noir); margin-top:8px;">She does not stop. Not for the 6am feed.</p>
      <p style="font-family:var(--font-serif); font-style:italic; font-weight:400; font-size:17px; line-height:1.5; color:var(--felora-noir); margin-top:8px;">For she who carries life.</p>
    </div>
    <div>
      <p style="font-family:var(--font-sans); font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--felora-mink); margin-bottom:12px;">FELŌRA never says</p>
      <p style="font-family:var(--font-sans); font-size:13px; line-height:1.6; color:var(--felora-mink); text-decoration:line-through; text-decoration-color:var(--felora-terra);">Don't compromise on comfort</p>
      <p style="font-family:var(--font-sans); font-size:13px; line-height:1.6; color:var(--felora-mink); text-decoration:line-through; text-decoration-color:var(--felora-terra); margin-top:6px;">Game changer · must-have · 70% off</p>
      <p style="font-family:var(--font-sans); font-size:13px; line-height:1.6; color:var(--felora-mink); text-decoration:line-through; text-decoration-color:var(--felora-terra); margin-top:6px;">Add to bag · emoji of any kind</p>
    </div>
  </div>
</div></body></html>
