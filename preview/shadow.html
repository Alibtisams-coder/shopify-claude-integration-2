<!doctype html><html><head><meta charset="utf-8" /><link rel="stylesheet" href="../colors_and_type.css" /><link rel="stylesheet" href="card.css" /></head><body>
<div class="card" style="gap:16px;">
  <label class="k">Elevation · flat by default</label>
  <div style="display:flex; gap:24px; align-items:center;">
    <div style="width:120px; height:80px; background:#fff; border:1px solid var(--border);"></div>
    <div style="width:120px; height:80px; background:#fff; box-shadow:0 1px 0 rgba(44,44,42,0.06), 0 24px 48px -32px rgba(44,44,42,0.18);"></div>
    <div style="flex:1;">
      <p style="font-family:var(--font-serif); font-style:italic; font-weight:400; font-size:18px; color:var(--felora-noir);">Hairline. Then almost nothing.</p>
      <p class="note" style="margin-top:6px;">Default cards: 1px hairline border, no shadow. Floating-on-photo cards: a single soft drop, used <em>once or twice per page</em>.</p>
    </div>
  </div>
</div></body></html>
